<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" role="img" aria-labelledby="title desc">
  <title id="title">Premium Dice Thumbnail</title>
  <desc id="desc">Casino style dice game promotional image</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#190f2f" />
      <stop offset="55%" stop-color="#2f1460" />
      <stop offset="100%" stop-color="#0b0917" />
    </linearGradient>
    <linearGradient id="diceFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#ece8ff" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#ffd95f" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#ffd95f" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="360" height="220" rx="18" fill="url(#bg)" />
  <circle cx="180" cy="118" r="110" fill="url(#glow)" />

  <text x="24" y="42" fill="#f7c400" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="26">
    PREMIUM DICE
  </text>
  <text x="24" y="68" fill="#d7d1eb" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="16">
    Roll high, win big
  </text>

  <g transform="translate(208 72) rotate(12)">
    <rect width="92" height="92" rx="16" fill="url(#diceFace)" stroke="#d8d1ee" stroke-width="3" />
    <circle cx="24" cy="24" r="8" fill="#251d39" />
    <circle cx="68" cy="24" r="8" fill="#251d39" />
    <circle cx="46" cy="46" r="8" fill="#251d39" />
    <circle cx="24" cy="68" r="8" fill="#251d39" />
    <circle cx="68" cy="68" r="8" fill="#251d39" />
  </g>

  <g transform="translate(114 95) rotate(-14)">
    <rect width="78" height="78" rx="14" fill="url(#diceFace)" stroke="#d8d1ee" stroke-width="3" />
    <circle cx="20" cy="20" r="7" fill="#251d39" />
    <circle cx="58" cy="20" r="7" fill="#251d39" />
    <circle cx="20" cy="58" r="7" fill="#251d39" />
    <circle cx="58" cy="58" r="7" fill="#251d39" />
  </g>
</svg>
