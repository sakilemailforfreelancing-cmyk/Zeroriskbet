    <rect x="14" y="14" width="50" height="80" rx="10" fill="#fff4e7" />
    <rect x="72" y="14" width="50" height="80" rx="10" fill="#fff4e7" />
    <rect x="130" y="14" width="50" height="80" rx="10" fill="#fff4e7" />
    <rect x="188" y="14" width="50" height="80" rx="10" fill="#fff4e7" />
