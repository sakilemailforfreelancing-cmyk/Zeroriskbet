<svg width="640" height="420" viewBox="0 0 640 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Coin flip thumbnail">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#13101f" />
      <stop offset="100%" stop-color="#090d19" />
    </linearGradient>
    <radialGradient id="coin" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fff0d8" />
