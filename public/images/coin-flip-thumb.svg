  <text x="36" y="84" fill="#ffe2c8" font-size="46" font-weight="900" font-family="Arial, Helvetica, sans-serif">COIN FLIP</text>
  <text x="36" y="128" fill="#fca264" font-size="25" font-weight="700" font-family="Arial, Helvetica, sans-serif">HEADS OR TAILS � WIN 2x</text>
