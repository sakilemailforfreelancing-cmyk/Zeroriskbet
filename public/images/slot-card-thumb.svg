<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" role="img" aria-labelledby="title desc">
  <title id="title">Premium Slots Thumbnail</title>
  <desc id="desc">Hot slot machine card for home page game list</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2b102f" />
      <stop offset="50%" stop-color="#4e1f33" />
      <stop offset="100%" stop-color="#1a0d1f" />
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd580" />
      <stop offset="100%" stop-color="#fca264" />
