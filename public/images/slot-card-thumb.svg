  </defs>

  <rect width="360" height="220" rx="18" fill="url(#bg)" />

  <g opacity="0.25">
    <circle cx="76" cy="46" r="8" fill="#ffd580" />
    <circle cx="301" cy="38" r="6" fill="#ffd580" />
    <circle cx="320" cy="176" r="10" fill="#ffd580" />
  </g>

  <text x="22" y="38" fill="#ffd580" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="900">
