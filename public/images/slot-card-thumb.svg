  </text>
  <text x="22" y="61" fill="#fbe7c3" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">
    HOT " HIGH VOLTAGE REELS
  </text>

  <g transform="translate(34 88)">
    <rect width="292" height="96" rx="14" fill="#1a1226" stroke="#fca264" stroke-width="3" />
    <rect x="16" y="16" width="50" height="64" rx="8" fill="#fff6ec" />
    <rect x="74" y="16" width="50" height="64" rx="8" fill="#fff6ec" />
    <rect x="132" y="16" width="50" height="64" rx="8" fill="#fff6ec" />
    <rect x="190" y="16" width="50" height="64" rx="8" fill="#fff6ec" />
    <rect x="248" y="16" width="28" height="64" rx="8" fill="#fff6ec" />

    <text x="40" y="57" text-anchor="middle" fill="#2a0f1f" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900">A</text>
    <text x="99" y="57" text-anchor="middle" fill="#2a0f1f" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900">K</text>
    <text x="157" y="57" text-anchor="middle" fill="#2a0f1f" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900">Q</text>
    <text x="215" y="57" text-anchor="middle" fill="#2a0f1f" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900">J</text>
    <text x="262" y="57" text-anchor="middle" fill="#2a0f1f" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="900">`</text>
